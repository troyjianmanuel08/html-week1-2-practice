<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="lead-capture.html">Lead Capture</a>
        <a href="lead-capture-v2.html">Lead Capture V2</a>
        <a href="table-practice.html">Table Practice</a>
      </nav>
    </header>
    <main>
      <h1>Contact Me</h1>
      <form>
        <label for="name">Name:</label>
        <br />
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required
        />
        <br />
        <label for="email">Email:</label>
        <br />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@gmail.com"
          required
        />
        <br />
        <label for="tel">Phone:</label>
        <br />
        <input
          type="tel"
          id="tel"
          name="tel"
          placeholder="09XXXXXXXXX"
          required
        />
        <br />
        <label for="message">Message:</label>
        <br />
        <textarea
          id="message"
          name="message"
          rows="4"
          cols="40"
          placeholder="Enter your message"
          required
        ></textarea>
        <br />
        <label for="source">How did you find me?</label><br />
        <select id="source" name="source">
          <option value="" disabled selected>Select an option</option>
          <option value="google">Google</option>
          <option value="facebook">Facebook</option>
          <option value="referral">Referral</option>
          <option value="other">Other</option></select
        ><br />
        <label for="budget1">Budget range</label><br />
        <input type="radio" id="budget1" name="budget" value="Below 5k" />
        <label for="budget1">Below 5k</label><br />
        <input type="radio" id="budget2" name="budget" value="5k-15k" />
        <label for="budget2">5k-15k</label><br />
        <input type="radio" id="budget3" name="budget" value="Above 15k" />
        <label for="budget3">Above 15k</label><br />
        <input type="checkbox" id="agree" name="agree" required />
        <label for="agree">I agree to be contacted</label><br /><br />
        <button type="submit">Send Message</button>
        <button type="reset">Clear</button>
      </form>
    </main>
  </body>
</html>
