<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Capture</title>
  </head>
  <body>
    <h1>Find Your Dream Property</h1>
    <p>Fill out the form below and we'll get back to you shortly</p>
    <form action="#" method="POST">
      <fieldset>
        <legend>Contact Information</legend>
        <label for="name"> Full Name </label>
        <br />
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Troy Jian S. Manuel"
          required
          aria-required="true"
          autocomplete="name"
        />
        <br />
        <label for="email"> Email </label>
        <br />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="troy@gmail.com"
          required
          aria-required="true"
          autocomplete="email"
        />
        <br />
        <label for="phone"> Phone </label>
        <br />
        <input
          type="tel"
          id="phone"
          name="phone"
          minlength="11"
          maxlength="11"
          placeholder="09XXXXXXXXX"
          required
          aria-required="true"
          aria-describedby="phone-hint"
          autocomplete="tel"
        />
        <br />
        <small id="phone-hint">Format: 09XXXXXXXXX (11 digits)</small>
      </fieldset>
      <br />
      <fieldset>
        <legend>Property Details</legend>
        <label for="budget">Budget Range</label>
        <br />
        <select id="budget" name="budget" required>
          <option value="" disabled selected>Select Budget</option>
          <option value="under-₱3M">Under ₱3M</option>
          <option value="₱3M-₱6M">₱3M - ₱6M</option>
          <option value="over-₱10M">Over ₱6M</option>
        </select>
        <br />
        <label for="type1"> Property Type </label>
        <br />
        <input
          type="radio"
          id="type1"
          name="property-type"
          value="condo"
          required
        />
        <label for="type1"> Condo </label>
        <br />
        <input
          type="radio"
          id="type2"
          name="property-type"
          value="House and Lot"
          required
        />
        <label for="type2"> House and Lot </label>
        <br />
        <input
          type="radio"
          id="type3"
          name="property-type"
          value="Commercial"
          required
        />

        <label for="type3"> Commercial </label>
        <br />
        <input
          type="radio"
          id="type4"
          name="property-type"
          value="Land"
          required
        />

        <label for="type4"> Land </label>
        <br />
        <label for="agree">how did you hear about us?</label>
        <br />
        <input type="checkbox" id="agree" name="agree" />
        <label for="agree"> Facebook</label>
        <br />
        <input type="checkbox" id="agree1" name="agree" />
        <label for="agree1"> Google</label>
        <br />
        <input type="checkbox" id="agree2" name="agree" />
        <label for="agree2"> Referral</label>
        <br />
        <input type="checkbox" id="agree3" name="agree" />
        <label for="agree3"> Walk-in</label>
        <br />
        <label for="message">Message</label><br />
        <textarea
          id="message"
          name="message"
          rows="8"
          cols="50"
          placeholder="Tell us what you're looking for..."
        >
        </textarea>
      </fieldset>
      <br />
      <button type="submit">Submit Inquiry</button>
      <button type="reset">Clear Form</button>
    </form>
  </body>
</html>
