<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Practice</title>
  </head>
  <body>
    <h1>Pricing Comparison</h1>
    <table>
      <caption>
        Pricing Table for practice
      </caption>
      <thead>
        <tr>
          <th scope="col">Feature</th>
          <th scope="col">Basic</th>
          <th scope="col">Standard</th>
          <th scope="col">Premium</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">AI Chatbot</th>
          <td>—</td>
          <td>✓</td>
          <td>✓</td>
        </tr>
        <tr>
          <th scope="row">Lead Form</th>
          <td>✓</td>
          <td>✓</td>
          <td>✓</td>
        </tr>
        <tr>
          <th scope="row">Google Sheets</th>
          <td>—</td>
          <td>✓</td>
          <td>✓</td>
        </tr>
        <tr>
          <th scope="row">Email Auto</th>
          <td>—</td>
          <td>—</td>
          <td>✓</td>
        </tr>
        <tr>
          <th scope="row">Mobile Friendly</th>
          <td>✓</td>
          <td>✓</td>
          <td>✓</td>
        </tr>
        <tr>
          <th scope="row">Support</th>
          <td>Email</td>
          <td>Chat</td>
          <td>24/7</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th scope="col">Best for</th>
          <th scope="col">Starter</th>
          <th scope="col">Growing</th>
          <th scope="col">Scaling</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
